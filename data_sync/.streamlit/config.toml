[client]
# Hata detaylarını sadece geliştirme ortamında göster (Canlıda gizli)
showErrorDetails = false


[server]
# Port ayarları (varsayılan 8501)
enableCORS = false
enableXsrfProtection = false
# Operatör aktif veri girişi sırasında oturum düşmesin (dakika)
maxMessageSize = 200

[browser]
# WebSocket bağlantısının kopup yeniden bağlanma süresi (saniye)
# Varsayılan 60 saniye - MAP operatörleri için 10 dakikaya çıkarıldı
serverTimeout = 600

[theme]
base = "dark"
primaryColor = "#FF4B4B" # Koyu modda daha canlı bir kırmızı/bordo
backgroundColor = "#0E1117" # Streamlit varsayılan koyu (Tam siyah için: #000000)
secondaryBackgroundColor = "#262730"
textColor = "#FAFAFA"
font = "sans serif"
